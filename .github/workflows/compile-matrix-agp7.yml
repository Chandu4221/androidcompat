name: Compile Matrix - AGP 7 (One-Time Historical Batch)

on:
  workflow_dispatch: # Manual trigger only — run once, never repeat

permissions:
  contents: write

jobs:
  generate-agp7-candidates:
    runs-on: ubuntu-latest
    outputs:
      combos: ${{ steps.read.outputs.combos }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate AGP 7 candidates
        run: node scripts/generate-candidates-agp7.js

      - name: Debug candidates file
        run: |
          echo "File exists: $(test -f data/combos-to-test-agp7.json && echo YES || echo NO)"
          echo "Content: $(cat data/combos-to-test-agp7.json)"

      - name: Read combos
        id: read
        run: |
          echo "📋 Candidate count: $(cat data/combos-to-test-agp7.json | node -e 'const d=JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")); console.log(d.length)')"
          COMBOS=$(cat data/combos-to-test-agp7.json | tr -d '\n')
          echo "combos=$COMBOS" >> $GITHUB_OUTPUT

  compile:
    needs: generate-agp7-candidates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        combo: ${{ fromJson(needs.generate-agp7-candidates.outputs.combos) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Inject versions
        run: node scripts/inject-versions-agp7.js '${{ toJson(matrix.combo) }}'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Stage - Sync
        id: sync
        run: |
          cd stub-project-agp7
          ./gradlew :app:preBuild --no-daemon --no-configuration-cache 2>&1 | tee ../sync-output.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Stage - Compile
        id: compile
        if: steps.sync.outcome == 'success'
        run: |
          cd stub-project-agp7
          ./gradlew :app:kspDebugKotlin :app:compileDebugKotlin --no-daemon --no-configuration-cache 2>&1 | tee ../compile-output.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Stage - Unit Test
        id: unit_test
        if: steps.compile.outcome == 'success'
        run: |
          cd stub-project-agp7
          ./gradlew :app:testDebugUnitTest --no-daemon --no-configuration-cache 2>&1 | tee ../unit-test-output.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Capture error log
        if: always()
        id: capture_error
        run: |
          ERROR_LOG=""
          for f in sync-output.log compile-output.log unit-test-output.log; do
            if [ -f "$f" ]; then
              FOUND=$(grep -A 8 -iE "FAILURE:|error:|Exception" "$f" | head -20 | tr '\n' ' ' || true)
              if [ -n "$FOUND" ]; then
                ERROR_LOG="$FOUND"
                break
              fi
            fi
          done
          echo "error_log=$ERROR_LOG" >> $GITHUB_OUTPUT

      - name: Capture logs
        if: always()
        run: |
          mkdir -p logs
          find stub-project-agp7 -name "*.log" -path "*/build/*" | head -20 | xargs -I{} cp {} logs/ 2>/dev/null || true
          find ~/.gradle/daemon -name "*.log" | sort -t- -k1 -r | head -1 | xargs cp -t logs/ 2>/dev/null || true
        continue-on-error: true

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-agp7-${{ strategy.job-index }}
          path: logs/

      - name: Record result
        if: always()
        run: |
          node scripts/update-compat.js \
            --combo '${{ toJson(matrix.combo) }}' \
            --sync-status ${{ steps.sync.outcome }} \
            --compile-status ${{ steps.compile.outcome }} \
            --unit-test-status "${{ steps.unit_test.outcome || 'skipped' }}" \
            --instrumentation-status skipped \
            --error-log "${{ steps.capture_error.outputs.error_log }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-agp7-${{ strategy.job-index }}
          path: data/compat.json

  merge-results:
    needs: compile
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge all results
        run: |
          node scripts/update-compat.js \
            --merge-artifacts \
            --artifacts-dir artifacts/

      - name: Commit final compat.json
        run: |
          git config user.name "androidcompat-bot"
          git config user.email "bot@androidcompat.dev"
          git add data/compat.json
          git diff --staged --quiet || git commit -m "data: update compat matrix - AGP 7 historical batch [skip ci]"
          git push
