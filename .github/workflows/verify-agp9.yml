name: Verify AGP 8.x

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Build bridge JAR
        run: |
          cd tools/gradle-bridge
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon

      - name: Upload bridge JAR
        uses: actions/upload-artifact@v7
        with:
          name: gradle-bridge
          path: tools/gradle-bridge/app/build/libs/gradle-bridge.jar
          retention-days: 1

  generate-combos:
    runs-on: ubuntu-latest
    outputs:
      combos: ${{ steps.combos.outputs.combos }}
      agp-major: ${{ steps.combos.outputs.agp-major }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Generate combos
        id: combos
        run: |
          COMBOS=$(cat data/agp9/combos-to-test.json | jq -c '.combos')
          echo "combos=$COMBOS" >> $GITHUB_OUTPUT
          echo "agp-major=9" >> $GITHUB_OUTPUT

  verify:
    name: "verify-${{ matrix.combo.id }}"
    needs: [build-bridge, generate-combos]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        combo: ${{ fromJson(needs.generate-combos.outputs.combos) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup JDK 17 for sdkmanager
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup JDK for build
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ matrix.combo.coreToolchain.jdk }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Download bridge JAR
        uses: actions/download-artifact@v8
        with:
          name: gradle-bridge
          path: .

      - name: Prepare build directory and inject versions
        run: |
          mkdir -p tmp-build
          cp -r stubs/agp9/* tmp-build/

          # Parse the nested combo JSON to extract flat flags for the Go tools
          COMBO='${{ toJson(matrix.combo) }}'

          go run cmd/inject/main.go \
            --dir=tmp-build \
            --agp=$(echo "$COMBO" | jq -r '.coreToolchain.agp') \
            --gradle=$(echo "$COMBO" | jq -r '.coreToolchain.gradle') \
            --kotlin=$(echo "$COMBO" | jq -r '.coreToolchain.kotlin') \
            --ksp=$(echo "$COMBO" | jq -r '.coreToolchain.ksp') \
            --compile-sdk=$(echo "$COMBO" | jq -r '.coreToolchain.compileSdk') \
            --agp-major=9 \
            --hilt=$(echo "$COMBO" | jq -r '.libraries | map(select(.name=="hilt")) | .[0].version // ""') \
            --room=$(echo "$COMBO" | jq -r '.libraries | map(select(.name=="room")) | .[0].version // ""') \
            --navigation=$(echo "$COMBO" | jq -r '.libraries | map(select(.name=="navigation")) | .[0].version // ""') \
            --compose-compiler=$(echo "$COMBO" | jq -r '.libraries | map(select(.name=="composeCompiler")) | .[0].version // ""')

      - name: Install Android SDK platform
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-${{ matrix.combo.coreToolchain.sdkPackage }}"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Run Gradle build with bridge
        id: build
        run: |
          cd tmp-build
          "$JAVA_HOME_17_X64/bin/java" -jar ${GITHUB_WORKSPACE}/gradle-bridge.jar \
            --project-dir . \
            --tasks build \
            --java-home "$JAVA_HOME" \
            > bridge-output.json \
            2> stdout.log \
            || true

      - name: Debug bridge output
        if: always()
        run: |
          echo "=== bridge-output.json contents ==="
          cat tmp-build/bridge-output.json || echo "File not found"
          echo "=== end ==="

      - name: Collect result
        run: |
          COMBO='${{ toJson(matrix.combo) }}'

          go run cmd/collect/main.go \
            --id=$(echo "$COMBO" | jq -r '.id') \
            --agp=$(echo "$COMBO" | jq -r '.coreToolchain.agp') \
            --gradle=$(echo "$COMBO" | jq -r '.coreToolchain.gradle') \
            --kotlin=$(echo "$COMBO" | jq -r '.coreToolchain.kotlin') \
            --ksp=$(echo "$COMBO" | jq -r '.coreToolchain.ksp') \
            --jdk=$(echo "$COMBO" | jq -r '.coreToolchain.jdk') \
            --compile-sdk=$(echo "$COMBO" | jq -r '.coreToolchain.compileSdk') \
            --sdk-package=$(echo "$COMBO" | jq -r '.coreToolchain.sdkPackage') \
            --hilt=$(echo "$COMBO" | jq -r '.libraries | map(select(.name=="hilt")) | .[0].version // ""') \
            --room=$(echo "$COMBO" | jq -r '.libraries | map(select(.name=="room")) | .[0].version // ""') \
            --navigation=$(echo "$COMBO" | jq -r '.libraries | map(select(.name=="navigation")) | .[0].version // ""') \
            --compose-compiler=$(echo "$COMBO" | jq -r '.libraries | map(select(.name=="composeCompiler")) | .[0].version // ""') \
            --dir=tmp-build \
            --out=. \
            --bridge-json tmp-build/bridge-output.json

      - name: Upload result artifact
        uses: actions/upload-artifact@v7
        with:
          name: result-${{ matrix.combo.id }}
          path: result-${{ matrix.combo.id }}.json

  aggregate:
    needs: verify
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Download all result artifacts
        uses: actions/download-artifact@v8
        with:
          path: results/

      - name: Merge results into compat.json
        run: |
          go run cmd/aggregate/main.go --agp=9 --results-dir=results/

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/agp9/compat.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update AGP9 compat results [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
