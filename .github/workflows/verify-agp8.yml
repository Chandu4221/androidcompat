name: Verify AGP 8.x

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Build bridge JAR
        run: |
          cd tools/gradle-bridge
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon

      - name: Upload bridge JAR
        uses: actions/upload-artifact@v7
        with:
          name: gradle-bridge
          path: tools/gradle-bridge/app/build/libs/gradle-bridge.jar
          retention-days: 1

  generate-combos:
    runs-on: ubuntu-latest
    outputs:
      combos: ${{ steps.combos.outputs.combos }}
      agp-major: ${{ steps.combos.outputs.agp-major }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Generate combos
        id: combos
        run: |
          COMBOS=$(cat data/agp8/combos-to-test.json | jq -c '.combos')
          echo "combos=$COMBOS" >> $GITHUB_OUTPUT
          echo "agp-major=8" >> $GITHUB_OUTPUT

  verify:
    needs: [build-bridge, generate-combos]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        combo: ${{ fromJson(needs.generate-combos.outputs.combos) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup JDK 17 for sdkmanager
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup JDK for build
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ matrix.combo.jdk }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Download bridge JAR
        uses: actions/download-artifact@v8
        with:
          name: gradle-bridge
          path: .

      - name: Prepare build directory and inject versions
        run: |
          mkdir -p tmp-build
          cp -r stubs/agp8/* tmp-build/
          go run cmd/inject/main.go \
            --dir=tmp-build \
            --agp=${{ matrix.combo.agp }} \
            --gradle=${{ matrix.combo.gradle }} \
            --kotlin=${{ matrix.combo.kotlin }} \
            --ksp=${{ matrix.combo.ksp }} \
            --compile-sdk=${{ matrix.combo.compileSdk }} \
            --agp-major=8

      - name: Install Android SDK platform
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-${{ matrix.combo.sdkPackage }}"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Run Gradle build with bridge
        id: build
        run: |
          cd tmp-build
          # Run the bridge – JSON goes to bridge-output.json, build log goes to stdout.log
          java -jar ${GITHUB_WORKSPACE}/gradle-bridge.jar \
            --project-dir . \
            --tasks build \
            --java-home "$JAVA_HOME" \
            > bridge-output.json \
            2> stdout.log \
            || true

      - name: Collect result
        run: |
          go run cmd/collect/main.go \
            --id=${{ matrix.combo.id }} \
            --agp=${{ matrix.combo.agp }} \
            --gradle=${{ matrix.combo.gradle }} \
            --kotlin=${{ matrix.combo.kotlin }} \
            --ksp=${{ matrix.combo.ksp }} \
            --jdk=${{ matrix.combo.jdk }} \
            --compile-sdk=${{ matrix.combo.compileSdk }} \
            --sdk-package=${{ matrix.combo.sdkPackage }} \
            --dir=tmp-build \
            --out=. \
            --bridge-json bridge-output.json

      - name: Upload result artifact
        uses: actions/upload-artifact@v7
        with:
          name: result-${{ matrix.combo.id }}
          path: result-${{ matrix.combo.id }}.json

  aggregate:
    needs: verify
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Download all result artifacts
        uses: actions/download-artifact@v8
        with:
          path: results/

      - name: Merge results into compat.json
        run: |
          go run cmd/aggregate/main.go --agp=8 --results-dir=results/

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/agp8/compat.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update AGP8 compat results [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
