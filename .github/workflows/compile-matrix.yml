name: Compile Matrix

on:
  push:
    paths:
      - "data/combos-to-test.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  load-combos:
    runs-on: ubuntu-latest
    outputs:
      combos: ${{ steps.read.outputs.combos }}
    steps:
      - uses: actions/checkout@v4
      - name: Read combos
        id: read
        run: |
          COMBOS=$(cat data/combos-to-test.json | tr -d '\n')
          echo "combos=$COMBOS" >> $GITHUB_OUTPUT

  compile:
    needs: load-combos
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        combo: ${{ fromJson(needs.load-combos.outputs.combos) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Inject versions
        run: node scripts/inject-versions.js '${{ toJson(matrix.combo) }}'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Stage - Sync
        id: sync
        run: |
          cd stub-project
          ./gradlew :app:generateDebugBuildConfig --no-daemon --no-configuration-cache
        continue-on-error: true

      - name: Stage - Compile
        id: compile
        if: steps.sync.outcome == 'success'
        run: |
          cd stub-project
          ./gradlew :app:kspDebugKotlin :app:compileDebugKotlin --no-daemon --no-configuration-cache
        continue-on-error: true

      - name: Stage - Unit Test
        id: unit_test
        if: steps.compile.outcome == 'success'
        run: |
          cd stub-project
          ./gradlew :app:testDebugUnitTest --no-daemon --no-configuration-cache
        continue-on-error: true

      - name: Capture logs
        if: always()
        run: |
          mkdir -p logs
          # Gradle writes build scan / output to these locations
          find stub-project -name "*.log" -path "*/build/*" | head -20 | xargs -I{} cp {} logs/ 2>/dev/null || true
          # Capture stdout from last failed task via Gradle's --scan or daemon logs
          find ~/.gradle/daemon -name "*.log" | sort -t- -k1 -r | head -1 | xargs cp -t logs/ 2>/dev/null || true
        continue-on-error: true

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ strategy.job-index }}
          path: logs/

      - name: Record result
        if: always()
        run: |
          node scripts/update-compat.js \
            --combo '${{ toJson(matrix.combo) }}' \
            --sync-status ${{ steps.sync.outcome }} \
            --compile-status ${{ steps.compile.outcome }} \
            --unit-test-status "${{ steps.unit_test.outcome || 'skipped' }}" \
            --instrumentation-status skipped \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ strategy.job-index }}
          path: data/compat.json

  merge-results:
    needs: compile
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Merge all results
        run: |
          node scripts/update-compat.js \
            --merge-artifacts \
            --artifacts-dir artifacts/
      - name: Commit final compat.json
        run: |
          git config user.name "androidcompat-bot"
          git config user.email "bot@androidcompat.dev"
          git add data/compat.json
          git diff --staged --quiet || git commit -m "data: update compat matrix from CI run [skip ci]"
          git push
