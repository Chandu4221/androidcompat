name: AGP/Gradle Baseline Matrix

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  load-combos:
    runs-on: ubuntu-latest
    outputs:
      combos: ${{ steps.set-matrix.outputs.combos }}
    steps:
      - uses: actions/checkout@v7
      - id: set-matrix
        run: |
          COMBOS=$(cat data/combos-to-test.json | jq -c '.')
          echo "combos=$COMBOS" >> $GITHUB_OUTPUT

  compile:
    needs: load-combos
    runs-on: ubuntu-latest
    if: ${{ needs.load-combos.outputs.combos != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        combo: ${{ fromJson(needs.load-combos.outputs.combos) }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup Java ${{ matrix.combo.java_version }}
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ matrix.combo.java_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Inject versions
        run: node scripts/inject-versions.js '${{ toJson(matrix.combo) }}'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Stage - Compile
        id: compile
        run: |
          cd stub-project
          ./gradlew compileDebugKotlin --no-daemon

      - name: Record Result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            node scripts/update-compat.js --combo '${{ toJson(matrix.combo) }}' --sync-status success --compile-status success --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            node scripts/update-compat.js --combo '${{ toJson(matrix.combo) }}' --sync-status failure --compile-status failure --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          cp data/compat.json result-${{ matrix.combo.agp }}-${{ matrix.combo.gradle }}.json

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: result-${{ matrix.combo.agp }}-${{ matrix.combo.gradle }}
          path: result-*.json

  merge-results:
    needs: compile
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v7

      - name: Download all result artifacts
        uses: actions/download-artifact@v8
        with:
          path: results
          pattern: result-*
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Merge results
        run: node scripts/update-compat.js --merge-artifacts --artifacts-dir results

      - name: Create Pull Request with new compat data
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update compatibility matrix"
          title: "Update Compatibility Matrix"
          body: "Automated PR to update data/compat.json with latest test results."
          branch: "update-compat-matrix"
          delete-branch: true
