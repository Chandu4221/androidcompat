// init-scripts/error-classification.gradle
// Gradle init script to emit structured error data on build failures.
// Applied via --init-script in CI workflows.

import groovy.json.JsonOutput

// Helper to walk the exception cause chain to the root cause
def rootCause(Throwable t) {
    def current = t
    while (current.cause != null && current.cause != current) {
        current = current.cause
    }
    return current
}

// 1. Task execution failures (e.g., compilation, KSP, Dagger)
gradle.taskGraph.whenReady { graph ->
    graph.addTaskExecutionListener(new TaskExecutionListener() {
        @Override
        void beforeExecute(Task task) {
            // No-op
        }

        @Override
        void afterExecute(Task task, TaskState state) {
            if (state.failure != null) {
                def rc = rootCause(state.failure)
                def data = [
                    task: task.path,
                    errorType: rc.class.name,
                    cause: rc.message
                ]
                println "[[ERROR_CLASSIFICATION]]" + JsonOutput.toJson(data)
            }
        }
    })
}

// 2. Configuration-phase failures (e.g., dependency resolution, plugin errors)
gradle.buildFinished { result ->
    if (result.failure != null) {
        def rc = rootCause(result.failure)
        def data = [
            task: "N/A",
            errorType: rc.class.name,
            cause: rc.message
        ]
        println "[[ERROR_CLASSIFICATION]]" + JsonOutput.toJson(data)
    }
}